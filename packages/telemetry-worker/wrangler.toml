name = "ashlr-stack-telemetry"
main = "src/worker.ts"
compatibility_date = "2026-01-01"
compatibility_flags = ["nodejs_compat"]

# Observability via Workers Logs — free on Workers Free plan.
[observability]
enabled = true

# NOTE: [limits] cpu_ms / request budgets require a paid plan. Free plan
# gets 100k requests/day + 10ms CPU default, which is plenty for v0.1.

# --- Custom domain (commented until DNS is pointed) -----------------------
# [[routes]]
# pattern = "telemetry.stack.ashlr.ai/*"
# zone_name = "ashlr.ai"
# custom_domain = true
