  </text>

  <g transform="translate(96, 484)">
    <rect x="0" y="0" width="720" height="66" rx="10" fill="#131316" stroke="#2a2a2e"/>
    <circle cx="20" cy="18" r="5" fill="#3d3d43"/>
    <circle cx="38" cy="18" r="5" fill="#3d3d43"/>
    <circle cx="56" cy="18" r="5" fill="#3d3d43"/>
    <text x="20" y="50" font-family="JetBrains Mono, monospace" font-size="20" fill="#e879f9">$</text>
    <text x="42" y="50" font-family="JetBrains Mono, monospace" font-size="20" fill="#e5e5e7">stack add supabase</text>
  </g>

  <text x="1104" y="556" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="500" fill="#8a8a90" text-anchor="end">
    stack.ashlr.ai
  </text>
