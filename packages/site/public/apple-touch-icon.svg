<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180" role="img" aria-label="Ashlr Stack">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0c10"/>
      <stop offset="100%" stop-color="#05070a"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#39556f" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#6b8097" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f5883e"/>
    </linearGradient>
    <linearGradient id="facet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5883e"/>
      <stop offset="100%" stop-color="#c2521c"/>
    </linearGradient>
    <linearGradient id="shadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1f26"/>
      <stop offset="100%" stop-color="#2a1a10"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="88%" r="55%">
      <stop offset="0%" stop-color="#e96b2a" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#e96b2a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sat" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbe1cf"/>
      <stop offset="35%" stop-color="#f5883e"/>
      <stop offset="100%" stop-color="#e96b2a"/>
    </radialGradient>
  </defs>
  <!-- Apple wants no rounded corners — iOS masks automatically. -->
  <rect width="180" height="180" fill="url(#bg)"/>
  <!-- Center (90,90). Ring radius 70. Spire apex (90,42), base (56,126)..(124,126). -->
  <ellipse cx="90" cy="152" rx="56" ry="12.6" fill="url(#glow)"/>
  <path d="M 90 20 A 70 70 0 0 1 147.5 127.4" stroke="url(#ring)" stroke-width="7.8" stroke-linecap="round" fill="none"/>
  <path d="M 46.8 149.2 A 70 70 0 0 1 22.85 69.2" stroke="url(#ring)" stroke-width="7.8" stroke-linecap="round" fill="none"/>
  <path d="M 22.85 69.2 A 70 70 0 0 1 46.8 149.2" stroke="#f5883e" stroke-opacity="0.45" stroke-width="3.9" stroke-dasharray="3.4 10.2" stroke-linecap="round" fill="none"/>
  <path d="M 90 42 L 90 126 L 56 126 Z" fill="url(#shadow)"/>
  <path d="M 90 42 L 124 126 L 90 126 Z" fill="url(#facet)"/>
  <path d="M 90 42 L 124 126 L 56 126 Z" fill="none" stroke="#f5883e" stroke-width="5.9" stroke-linejoin="miter"/>
  <line x1="90" y1="42" x2="90" y2="126" stroke="#fbe1cf" stroke-opacity="0.2" stroke-width="2.2"/>
  <circle cx="125" cy="29" r="11.2" fill="url(#sat)"/>
  <circle cx="125" cy="29" r="3.9" fill="#fbe1cf"/>
</svg>
