<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Ashlr Stack">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0c10"/>
      <stop offset="100%" stop-color="#05070a"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#39556f" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#6b8097" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#f5883e"/>
    </linearGradient>
    <linearGradient id="facet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5883e"/>
      <stop offset="100%" stop-color="#c2521c"/>
    </linearGradient>
    <linearGradient id="shadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1f26"/>
      <stop offset="100%" stop-color="#2a1a10"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="88%" r="55%">
      <stop offset="0%" stop-color="#e96b2a" stop-opacity="0.5"/>
      <stop offset="70%" stop-color="#e96b2a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sat" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbe1cf"/>
      <stop offset="35%" stop-color="#f5883e"/>
      <stop offset="100%" stop-color="#e96b2a"/>
    </radialGradient>
    <filter id="satglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Center (256,256). Ring radius 200. Spire apex (256,120), base (160,360)..(352,360). -->
  <ellipse cx="256" cy="432" rx="160" ry="36" fill="url(#glow)"/>
  <!-- Soft halo behind satellite for premium feel at 512 -->
  <circle cx="356" cy="82.8" r="28" fill="#e96b2a" fill-opacity="0.28" filter="url(#satglow)"/>
  <path d="M 256 56 A 200 200 0 0 1 420 364" stroke="url(#ring)" stroke-width="22" stroke-linecap="round" fill="none"/>
  <path d="M 132.8 426.6 A 200 200 0 0 1 65.2 197.8" stroke="url(#ring)" stroke-width="22" stroke-linecap="round" fill="none"/>
  <path d="M 65.2 197.8 A 200 200 0 0 1 132.8 426.6" stroke="#f5883e" stroke-opacity="0.45" stroke-width="11" stroke-dasharray="10 30" stroke-linecap="round" fill="none"/>
  <path d="M 256 120 L 256 360 L 160 360 Z" fill="url(#shadow)"/>
  <path d="M 256 120 L 352 360 L 256 360 Z" fill="url(#facet)"/>
  <path d="M 256 120 L 352 360 L 160 360 Z" fill="none" stroke="#f5883e" stroke-width="16.5" stroke-linejoin="miter"/>
  <line x1="256" y1="120" x2="256" y2="360" stroke="#fbe1cf" stroke-opacity="0.2" stroke-width="6"/>
  <circle cx="356" cy="82.8" r="32" fill="url(#sat)"/>
  <circle cx="356" cy="82.8" r="11" fill="#fbe1cf"/>
</svg>
