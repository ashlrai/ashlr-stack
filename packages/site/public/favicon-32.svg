<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" role="img" aria-label="Ashlr Stack">
  <defs>
    <linearGradient id="r" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#6b8097" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#f5883e"/>
    </linearGradient>
    <linearGradient id="f" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5883e"/>
      <stop offset="100%" stop-color="#c2521c"/>
    </linearGradient>
  </defs>
  <!-- Dark chip so it reads on any tab background -->
  <rect width="32" height="32" rx="6" fill="#05070a"/>
  <!-- Simplified ring (single arc, heavier stroke) for 16 px legibility -->
  <path d="M 16 3.5 A 12.5 12.5 0 0 1 26.25 22.75" stroke="url(#r)" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <path d="M 8.3 26.65 A 12.5 12.5 0 0 1 4.08 12.35" stroke="url(#r)" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <!-- Spire: two-facet prism -->
  <path d="M 16 7.5 L 16 22.5 L 10 22.5 Z" fill="#1a1f26"/>
  <path d="M 16 7.5 L 22 22.5 L 16 22.5 Z" fill="url(#f)"/>
  <path d="M 16 7.5 L 22 22.5 L 10 22.5 Z" fill="none" stroke="#f5883e" stroke-width="1.2" stroke-linejoin="miter"/>
  <!-- Satellite -->
  <circle cx="22.25" cy="5.18" r="2.1" fill="#f5883e"/>
  <circle cx="22.25" cy="5.18" r="0.8" fill="#fbe1cf"/>
</svg>
