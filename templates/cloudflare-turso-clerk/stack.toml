# Edge-first starter: Cloudflare Workers + Turso DB + Clerk auth.
# Pairs well with Next.js-on-Cloudflare or Hono.

[stack]
version = "1"
template = "cloudflare-turso-clerk"

[services.cloudflare]
provider = "cloudflare"
secrets = ["CLOUDFLARE_API_TOKEN", "CLOUDFLARE_ACCOUNT_ID"]

[services.turso]
provider = "turso"
secrets = ["TURSO_DATABASE_URL", "TURSO_AUTH_TOKEN", "TURSO_PLATFORM_TOKEN"]

[services.clerk]
provider = "clerk"
secrets = ["CLERK_SECRET_KEY"]

[services.sentry]
provider = "sentry"
secrets = ["SENTRY_AUTH_TOKEN", "SENTRY_DSN", "SENTRY_ORG", "SENTRY_PROJECT"]
mcp = "sentry"

[[environments]]
name = "dev"
default = true

[[environments]]
name = "prod"
